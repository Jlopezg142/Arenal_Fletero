<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Arenal Fletero</title>

    <link
        rel="stylesheet"
        href="./css/styles.css"
    >
</head>

<body>
    <main class="contenedor-principal">
        <header class="encabezado">
            <div class="titulo-aplicacion">
                <h1>Arenal Fletero</h1>
                <p>Registro de entregas</p>
            </div>

            <img
                src="./images/logo-arenal.png"
                alt="El Arenal"
                class="logo-empresa"
            >
        </header>

        <!-- Inicio de sesión -->
        <section
            id="seccion-login"
            class="tarjeta"
        >
            <h2>Iniciar sesión</h2>

            <p class="texto-secundario">
                Ingresa tu usuario y contraseña.
            </p>

            <form id="form-login">
                <div class="grupo-campo">
                    <label for="usuario">
                        Usuario
                    </label>

                    <input
                        type="text"
                        id="usuario"
                        name="usuario"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="grupo-campo">
                    <label for="password">
                        Contraseña
                    </label>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button
                    type="submit"
                    class="boton boton-principal"
                >
                    Ingresar
                </button>
            </form>

            <div
                id="mensaje-login"
                class="mensaje oculto"
            ></div>
        </section>

        <!-- Registro de entrega -->
        <section
            id="seccion-entrega"
            class="tarjeta oculto"
        >
            <div class="encabezado-seccion">
                <div>
                    <h2>Nueva entrega</h2>

                    <p class="texto-secundario">
                        Registra la evidencia del envío.
                    </p>
                </div>

                <button
                    type="button"
                    id="boton-cerrar-sesion"
                    class="boton boton-secundario"
                >
                    Salir
                </button>
            </div>

            <form id="form-entrega">
                <div class="grupo-campo">
                    <label for="agencia_id">
                        Agencia
                    </label>

                    <select
                        id="agencia_id"
                        name="agencia_id"
                        required
                        disabled
                    >
                        <option value="">
                            Cargando agencias...
                        </option>
                    </select>

                    <small
                        id="estado-agencias"
                        class="oculto"
                    ></small>
                </div>

                <div class="grupo-campo">
                    <label for="envio">
                        Número de envío
                    </label>

                    <input
                        type="number"
                        id="envio"
                        name="envio"
                        min="1"
                        inputmode="numeric"
                        required
                    >
                </div>

                <div class="grupo-campo">
                    <label for="comentario">
                        Comentario
                    </label>

                    <textarea
                        id="comentario"
                        name="comentario"
                        maxlength="1000"
                        rows="4"
                        placeholder="Comentario opcional"
                    ></textarea>
                </div>

                <div class="grupo-campo">
                    <label for="foto_envio">
                        Fotografía del envío
                    </label>

                    <input
                        type="file"
                        id="foto_envio"
                        name="foto_envio"
                        accept="image/jpeg,image/png"
                        capture="environment"
                        required
                    >

                    <small>
                        Formatos permitidos: JPG, JPEG y PNG.
                    </small>
                </div>

                <section class="bloque-ubicacion">
                    <h3>Ubicación actual</h3>

                    <p id="estado-ubicacion">
                        La ubicación todavía no ha sido obtenida.
                    </p>

                    <button
                        type="button"
                        id="boton-obtener-ubicacion"
                        class="boton boton-ubicacion"
                    >
                        Obtener ubicación
                    </button>

                    <input
                        type="hidden"
                        id="latitud"
                        name="latitud"
                    >

                    <input
                        type="hidden"
                        id="longitud"
                        name="longitud"
                    >
                </section>

                <button
                    type="submit"
                    id="boton-registrar"
                    class="boton boton-principal"
                >
                    Registrar entrega
                </button>
            </form>

            <div
                id="mensaje-entrega"
                class="mensaje oculto"
            ></div>
        </section>
    </main>

    <footer class="pie-pagina">
        <span>Jl-A</span>
    </footer>

    <script src="./js/app.js?v=1.2.1"></script>
</body>
</html>
